<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
    <div class="glitch-container">
        <header>
            <h1 class="glitch" data-text="{{ site.title }}">{{ site.title }}</h1>
        </header>
        {% include navigation.html %}</q>
        <main>
            {{ content }}
        </main>
        {% include footer.html %}
    </div>
    <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
    <!-- Highlight.js CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/monokai-sublime.css' | relative_url }}">

    <!-- Highlight.js JS -->
    <script src="{{ '/assets/js/highlight.min.js' | relative_url }}"></script>
    <script>hljs.highlightAll();</script>
   

</body>
</html>
